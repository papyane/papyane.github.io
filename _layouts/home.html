<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title | default: site.title }}</title>
    <link rel="stylesheet" href="{{ '/assets/css/minimal-gallery.css' | relative_url }}">
</head>
<body>

    <main class="content">
        <div class="intro-text">
            <h1>Elen Papyan</h1> <p class="title">CS and Math Student at UC Berkeley</p>
            <p>I like something.</p>
            <a href="/assets/resume.pdf" class="resume-link" target="_blank">[Resume]</a>
            <a href="/projects/" class="project-link" target="_blank">[Projects]</a>
        </div>

        <div class="gallery-container">
            {% for item in site.data.gallery %}
                <div class="gallery-item {% if forloop.first %}active{% endif %}" style="background-image: url('{{ item.image | relative_url }}');">
                </div>
            {% endfor %}

            <div class="gallery-controls">
                <p id="image-location" class="location-text">Image: {{ site.data.gallery[0].location }}</p>
                <div class="navigation-arrows">
                    <span id="prev" class="arrow prev-arrow"><</span>
                    <span id="counter" class="counter-text">1 / {{ site.data.gallery | size }}</span>
                    <span id="next" class="arrow next-arrow">></span>
                </div>
            </div>
        </div>
    </main>

    <script>
        // Pull the location data from Jekyll into JavaScript
        const locations = [
            {% for item in site.data.gallery %}
                "{{ item.location }}"{% unless forloop.last %},{% endunless %}
            {% endfor %}
        ];
        
        const items = document.querySelectorAll('.gallery-item');
        const locationElement = document.getElementById('image-location');
        const counterElement = document.getElementById('counter');
        let currentIndex = 0;

        function updateGallery(newIndex) {
            // Remove active class from current image
            items[currentIndex].classList.remove('active');
            
            // Update index with wrapping (so going past the end loops to the start)
            currentIndex = newIndex;
            if (currentIndex >= items.length) currentIndex = 0;
            if (currentIndex < 0) currentIndex = items.length - 1;
            
            // Add active class to new image
            items[currentIndex].classList.add('active');
            
            // Update text
            locationElement.innerText = "Image: " + locations[currentIndex];
            counterElement.innerText = (currentIndex + 1) + " / " + items.length;
        }

        document.getElementById('next').addEventListener('click', () => {
            updateGallery(currentIndex + 1);
        });

        document.getElementById('prev').addEventListener('click', () => {
            updateGallery(currentIndex - 1);
        });
    </script>
</body>
</html>
